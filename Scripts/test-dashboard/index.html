<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFM Test Dashboard</title>

<!-- Tailwind CSS (CDN Play) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine.js + Collapse plugin -->
<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3/dist/cdn.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- Marked (Markdown) -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        surface: { DEFAULT: '#0d1117', card: '#161b22', hover: '#1c2128', raised: '#21262d' },
        border: { DEFAULT: '#30363d', focus: '#58a6ff', muted: '#21262d' },
        accent: {
          blue: '#58a6ff', 'blue-dim': '#1f6feb',
          green: '#3fb950', 'green-dim': '#238636', 'green-bg': '#0d2818',
          red: '#f85149', 'red-dim': '#da3633', 'red-bg': '#2d1215',
          yellow: '#d29922', 'yellow-dim': '#9e6a03', 'yellow-bg': '#2d2400',
          purple: '#d2a8ff', 'purple-dim': '#8957e5',
          orange: '#ffa657',
        },
        muted: '#8b949e',
        faint: '#484f58',
      },
      fontFamily: {
        mono: ['"SF Mono"', 'Menlo', 'Monaco', '"Cascadia Code"', 'monospace'],
        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', 'Arial', 'sans-serif'],
      },
      animation: {
        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
        'fade-in': 'fadeIn 0.3s ease-out forwards',
        'slide-in-right': 'slideInRight 0.3s ease-out forwards',
        'slide-up': 'slideUp 0.4s ease-out forwards',
        'progress-stripe': 'progressStripe 1s linear infinite',
        'glow-pulse': 'glowPulse 2s ease-in-out infinite',
      },
      keyframes: {
        fadeIn: { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
        slideInRight: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(0)' } },
        slideUp: { '0%': { opacity: '0', transform: 'translateY(16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
        progressStripe: { '0%': { backgroundPosition: '1rem 0' }, '100%': { backgroundPosition: '0 0' } },
        glowPulse: { '0%, 100%': { boxShadow: '0 0 8px rgba(88, 166, 255, 0.3)' }, '50%': { boxShadow: '0 0 20px rgba(88, 166, 255, 0.6)' } },
      },
    },
  },
};
</script>

<style>
  /* Base scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

  /* Custom checkbox */
  .custom-checkbox {
    appearance: none; -webkit-appearance: none;
    width: 18px; height: 18px; border: 2px solid #30363d; border-radius: 4px;
    background: #0d1117; cursor: pointer; position: relative;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  .custom-checkbox:checked {
    background: #1f6feb; border-color: #58a6ff;
  }
  .custom-checkbox:checked::after {
    content: ''; position: absolute; top: 2px; left: 5px;
    width: 5px; height: 9px; border: solid white; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .custom-checkbox:hover { border-color: #58a6ff; }

  /* Animated progress bar stripes */
  .progress-animated {
    background-image: linear-gradient(
      45deg, rgba(255,255,255,0.1) 25%, transparent 25%,
      transparent 50%, rgba(255,255,255,0.1) 50%,
      rgba(255,255,255,0.1) 75%, transparent 75%, transparent
    );
    background-size: 1rem 1rem;
  }

  /* Glassmorphism card */
  .glass-card {
    background: rgba(22, 27, 34, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-icon { animation: spin 1s linear infinite; }

  /* Toast stack */
  .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200; display: flex; flex-direction: column-reverse; gap: 0.5rem; }

  /* Ensure select styling */
  select option { background: #161b22; color: #e6edf3; }

  /* Transition helpers */
  [x-cloak] { display: none !important; }
</style>
</head>

<body class="bg-surface text-gray-200 font-sans min-h-screen antialiased" x-data="dashboard" x-cloak>

<!-- ============================================================ -->
<!-- TOAST NOTIFICATIONS                                          -->
<!-- ============================================================ -->
<div class="toast-container">
  <template x-for="(t, i) in toasts" :key="t.id">
    <div x-show="t.visible"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4"
         :class="{
           'bg-accent-green-bg border-accent-green-dim text-accent-green': t.type === 'success',
           'bg-accent-red-bg border-accent-red-dim text-accent-red': t.type === 'error',
           'bg-[#0d1a30] border-accent-blue-dim text-accent-blue': t.type === 'info',
           'bg-accent-yellow-bg border-accent-yellow-dim text-accent-yellow': t.type === 'warning',
         }"
         class="px-4 py-3 rounded-lg border text-sm font-medium shadow-lg shadow-black/30 max-w-sm flex items-center gap-2">
      <i :data-lucide="t.type === 'success' ? 'check-circle-2' : t.type === 'error' ? 'x-circle' : t.type === 'warning' ? 'alert-triangle' : 'info'"
         class="w-4 h-4 flex-shrink-0"></i>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>

<!-- ============================================================ -->
<!-- MAIN APP SHELL                                               -->
<!-- ============================================================ -->
<div class="max-w-[1360px] mx-auto px-4 py-5 space-y-4">

  <!-- ────────────────────────────────────────────────────────── -->
  <!-- HEADER                                                     -->
  <!-- ────────────────────────────────────────────────────────── -->
  <header class="flex items-center justify-between px-5 py-4 rounded-xl border border-border bg-gradient-to-br from-[#1a1f2e] to-surface-card">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-blue to-accent-purple flex items-center justify-center">
        <i data-lucide="diamond" class="w-4 h-4 text-white"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-accent-blue to-accent-purple bg-clip-text text-transparent">
          AFM Test Dashboard
        </h1>
        <p class="text-xs text-muted mt-0.5">Production Release Validation</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span x-show="binary.version"
            class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-[#1a1a2e] text-accent-purple border border-accent-purple-dim font-mono"
            x-text="binary.version"></span>
      <button @click="showHistory = true"
              class="flex items-center gap-2 px-3 py-2 rounded-lg border border-border bg-surface-card text-sm font-medium text-gray-300 hover:bg-surface-hover hover:border-faint transition-all duration-150 active:scale-[0.98]">
        <i data-lucide="history" class="w-4 h-4"></i>
        History
      </button>
    </div>
  </header>

  <!-- ────────────────────────────────────────────────────────── -->
  <!-- CONFIGURATION BAR                                          -->
  <!-- ────────────────────────────────────────────────────────── -->
  <section class="rounded-xl border border-border bg-surface-card p-5 animate-fade-in">
    <div class="flex items-center gap-2 mb-4">
      <i data-lucide="settings-2" class="w-4 h-4 text-muted"></i>
      <h2 class="text-xs font-semibold uppercase tracking-wider text-muted">Configuration</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-[1fr_280px_auto] gap-5 items-end">
      <!-- Binary Path -->
      <div>
        <label class="block text-xs font-semibold text-muted uppercase tracking-wide mb-1.5">Binary Path</label>
        <div class="flex items-center gap-2">
          <input type="text" x-model="binary.path"
                 @change="onBinaryChange()"
                 placeholder=".build/release/afm" spellcheck="false"
                 class="flex-1 px-3 py-2 rounded-lg border border-border bg-surface text-sm font-mono text-gray-200 placeholder-faint outline-none focus:border-accent-blue transition-colors">
          <span x-show="binary.exists"
                class="flex items-center gap-1 text-xs text-accent-green font-medium whitespace-nowrap">
            <i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> Detected
          </span>
        </div>
      </div>

      <!-- Model Select -->
      <div>
        <label class="block text-xs font-semibold text-muted uppercase tracking-wide mb-1.5">Model</label>
        <select x-model="selectedModel"
                class="w-full px-3 py-2 rounded-lg border border-border bg-surface text-sm font-mono text-gray-200 outline-none focus:border-accent-blue transition-colors cursor-pointer">
          <option value="" disabled x-text="models.length === 0 ? 'Loading models...' : 'Select a model...'"></option>
          <template x-for="m in models" :key="m.id">
            <option :value="m.id" x-text="m.id + (m.size_gb ? ' (' + m.size_gb + ' GB)' : '')"></option>
          </template>
        </select>
      </div>

      <!-- Preflight -->
      <div class="flex flex-col items-center gap-1.5">
        <label class="text-xs font-semibold text-muted uppercase tracking-wide">Pre-flight</label>
        <div class="flex items-center gap-2">
          <template x-for="check in preflightChecks" :key="check.key">
            <div class="relative group">
              <div class="w-7 h-7 rounded-full transition-all duration-300 cursor-default flex items-center justify-center"
                   :class="{
                     'bg-border-muted': !preflight[check.key],
                     'bg-accent-green shadow-[0_0_8px_rgba(63,185,80,0.35)]': preflight[check.key]?.status === 'pass',
                     'bg-accent-red shadow-[0_0_8px_rgba(248,81,73,0.35)]': preflight[check.key]?.status === 'fail',
                     'bg-accent-yellow shadow-[0_0_8px_rgba(210,153,34,0.35)]': preflight[check.key]?.status === 'warn',
                     'bg-border animate-pulse-slow': preflightRunning && !preflight[check.key],
                   }">
                <i x-show="preflight[check.key]?.status === 'pass'" data-lucide="check" class="w-3.5 h-3.5 text-white"></i>
                <i x-show="preflight[check.key]?.status === 'fail'" data-lucide="x" class="w-3.5 h-3.5 text-white"></i>
                <i x-show="preflight[check.key]?.status === 'warn'" data-lucide="alert-triangle" class="w-3 h-3 text-white"></i>
              </div>
              <!-- Tooltip -->
              <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 rounded-md bg-surface-raised border border-border text-xs text-gray-200 whitespace-nowrap shadow-lg shadow-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-150 pointer-events-none z-50">
                <span class="font-medium" x-text="check.label + ': '"></span>
                <span x-text="preflight[check.key] ? (preflight[check.key].value || preflight[check.key].status || 'checking...') : 'not checked'"></span>
                <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-border"></div>
              </div>
            </div>
          </template>
          <button x-show="!preflightRunning && binary.path"
                  @click="runPreflight()"
                  class="ml-1 p-1.5 rounded-md text-muted hover:text-accent-blue hover:bg-surface-hover transition-all"
                  title="Re-run pre-flight checks">
            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
          </button>
          <div x-show="preflightRunning" class="ml-1">
            <i data-lucide="loader-2" class="w-4 h-4 text-accent-blue spinner-icon"></i>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ────────────────────────────────────────────────────────── -->
  <!-- TEST SUITES SELECTION                                      -->
  <!-- ────────────────────────────────────────────────────────── -->
  <section class="rounded-xl border border-border bg-surface-card p-5 animate-fade-in" style="animation-delay: 0.05s">
    <!-- Controls bar -->
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <i data-lucide="test-tubes" class="w-4 h-4 text-muted"></i>
          <h2 class="text-xs font-semibold uppercase tracking-wider text-muted">Test Suites</h2>
          <span class="px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-border-muted text-muted"
                x-text="Object.keys(suites).length"></span>
        </div>
        <label class="flex items-center gap-2 cursor-pointer text-sm text-muted hover:text-gray-300 transition-colors select-none"
               :class="{ 'pointer-events-none opacity-50': running }">
          <input type="checkbox"
                 class="custom-checkbox"
                 :checked="selectedCount === Object.keys(suites).length && selectedCount > 0"
                 :indeterminate.prop="selectedCount > 0 && selectedCount < Object.keys(suites).length"
                 @change="$event.target.checked ? selectAll() : deselectAll()">
          Select All
        </label>
      </div>
      <div class="flex items-center gap-3">
        <span x-show="selectedCount > 0"
              class="text-xs text-faint font-mono"
              x-text="'Est. ' + formatDuration(estimatedMinutes * 60)">
        </span>

        <!-- Stop button -->
        <button x-show="running" @click="stopRun()"
                class="flex items-center gap-2 px-4 py-2 rounded-lg bg-accent-red-bg border border-accent-red-dim text-accent-red text-sm font-semibold hover:bg-[#3d1518] transition-all active:scale-[0.98]">
          <i data-lucide="square" class="w-3.5 h-3.5"></i>
          Stop
        </button>

        <!-- Run button -->
        <button x-show="!running" @click="startRun()"
                :disabled="!canRun"
                class="flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold transition-all active:scale-[0.98]"
                :class="canRun
                  ? 'bg-accent-blue-dim border border-accent-blue text-white hover:bg-[#2a6dc7] shadow-lg shadow-accent-blue/20'
                  : 'bg-border border border-faint text-muted cursor-not-allowed'">
          <i data-lucide="play" class="w-4 h-4"></i>
          <span x-text="selectedCount > 0 ? 'Run ' + selectedCount + ' Suite' + (selectedCount !== 1 ? 's' : '') : 'Select Tests'"></span>
        </button>
      </div>
    </div>

    <!-- Suite Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
      <template x-for="(def, id) in suites" :key="id">
        <div @click="!running && toggleSuite(id)"
             class="relative rounded-lg border p-4 cursor-pointer transition-all duration-200 select-none group"
             :class="{
               'border-accent-blue bg-accent-blue/[0.06] shadow-[0_0_0_1px_rgba(88,166,255,0.15)] scale-[1.01]': selected.has(id),
               'border-border bg-surface hover:border-faint hover:bg-surface-card hover:shadow-md hover:shadow-black/20 hover:-translate-y-0.5': !selected.has(id),
               'pointer-events-none opacity-60': running,
             }">
          <!-- Top row: checkbox + icon + name -->
          <div class="flex items-center gap-2.5 mb-2">
            <input type="checkbox"
                   class="custom-checkbox"
                   :checked="selected.has(id)"
                   @click.stop="toggleSuite(id)"
                   :disabled="running">
            <i :data-lucide="suiteIcon(id)" class="w-4 h-4 flex-shrink-0"
               :class="selected.has(id) ? 'text-accent-blue' : 'text-faint group-hover:text-muted'"></i>
            <span class="font-semibold text-sm truncate"
                  :class="selected.has(id) ? 'text-gray-100' : 'text-gray-300'"
                  x-text="def.label"></span>
          </div>
          <!-- Description -->
          <p class="text-xs text-muted leading-relaxed ml-[42px] mb-3 line-clamp-2" x-text="def.desc"></p>
          <!-- Footer: est + port -->
          <div class="flex items-center justify-between ml-[42px]">
            <span class="text-[11px] text-faint font-mono" x-text="def.est"></span>
            <span x-show="def.port"
                  class="text-[10px] px-1.5 py-0.5 rounded bg-border-muted text-faint font-mono"
                  x-text="':' + def.port"></span>
          </div>

          <!-- Per-suite options panel — auto-shows when selected + has options -->
          <div x-show="selected.has(id) && suiteOptionDefs[id]"
               x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="opacity-0 max-h-0" x-transition:enter-end="opacity-100 max-h-40"
               x-transition:leave="transition ease-in duration-150"
               x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
               @click.stop
               class="mt-3 pt-3 border-t border-accent-blue/20 space-y-2.5 ml-[42px]">
            <div class="flex items-center gap-1.5 mb-1">
              <i data-lucide="sliders-horizontal" class="w-3 h-3 text-accent-blue"></i>
              <span class="text-[10px] font-semibold uppercase tracking-wider text-accent-blue">Options</span>
            </div>
            <template x-for="opt in (suiteOptionDefs[id] || [])" :key="opt.key">
              <div class="flex items-center gap-2">
                <!-- Toggle option -->
                <template x-if="opt.type === 'toggle'">
                  <label class="flex items-center gap-2.5 cursor-pointer w-full py-0.5 hover:bg-white/[0.02] rounded px-1 -mx-1">
                    <input type="checkbox"
                           class="custom-checkbox"
                           :checked="getSuiteOpt(id, opt.key, opt.default)"
                           @change="setSuiteOpt(id, opt.key, $event.target.checked)"
                           :disabled="running">
                    <span class="text-xs text-gray-400" x-text="opt.label"></span>
                  </label>
                </template>
                <!-- Select option -->
                <template x-if="opt.type === 'select'">
                  <label class="flex items-center gap-2.5 w-full">
                    <span class="text-xs text-gray-400 whitespace-nowrap min-w-[60px]" x-text="opt.label"></span>
                    <select class="flex-1 text-xs bg-surface border border-border rounded-md px-2 py-1 text-gray-300 focus:border-accent-blue focus:ring-1 focus:ring-accent-blue/30 outline-none appearance-none cursor-pointer"
                            :value="getSuiteOpt(id, opt.key, opt.default)"
                            @change="setSuiteOpt(id, opt.key, $event.target.value)"
                            :disabled="running">
                      <template x-for="v in opt.values" :key="v">
                        <option :value="v" x-text="v"></option>
                      </template>
                    </select>
                  </label>
                </template>
                <!-- Text option -->
                <template x-if="opt.type === 'text'">
                  <label class="flex items-center gap-2.5 w-full">
                    <span class="text-xs text-gray-400 whitespace-nowrap min-w-[60px]" x-text="opt.label"></span>
                    <input type="text"
                           class="flex-1 text-xs bg-surface border border-border rounded-md px-2 py-1 text-gray-300 focus:border-accent-blue focus:ring-1 focus:ring-accent-blue/30 outline-none font-mono"
                           :value="getSuiteOpt(id, opt.key, opt.default)"
                           @input="setSuiteOpt(id, opt.key, $event.target.value)"
                           :placeholder="opt.placeholder || ''"
                           :disabled="running">
                  </label>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </section>

  <!-- ────────────────────────────────────────────────────────── -->
  <!-- PROGRESS SECTION                                           -->
  <!-- ────────────────────────────────────────────────────────── -->
  <section x-show="showProgressSection" x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
           class="rounded-xl border border-border bg-surface-card p-5 space-y-4">

    <div class="flex items-center gap-2 mb-1">
      <i data-lucide="activity" class="w-4 h-4 text-muted"></i>
      <h2 class="text-xs font-semibold uppercase tracking-wider text-muted">Progress</h2>
    </div>

    <!-- Overall progress bar + stats (sticky) -->
    <div class="sticky top-0 z-10 rounded-lg border border-border bg-surface-card/95 backdrop-blur-md p-4 space-y-3">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-5 text-sm">
          <span class="flex items-center gap-1.5">
            <span class="text-muted">Suites:</span>
            <span class="font-mono font-bold text-accent-blue" x-text="completedSuiteCount + '/' + suiteOrder.length"></span>
          </span>
          <span class="flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-accent-green"></span>
            <span class="font-mono font-bold text-accent-green" x-text="overallPassed"></span>
          </span>
          <span x-show="overallFailed > 0" class="flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-accent-red"></span>
            <span class="font-mono font-bold text-accent-red" x-text="overallFailed"></span>
          </span>
          <span class="flex items-center gap-1.5 text-muted">
            <i data-lucide="clock" class="w-3.5 h-3.5"></i>
            <span class="font-mono font-bold" x-text="formatDuration(elapsed)"></span>
          </span>
        </div>
        <span x-show="running" class="flex items-center gap-1.5 text-xs text-accent-blue">
          <i data-lucide="loader-2" class="w-3.5 h-3.5 spinner-icon"></i>
          Running...
        </span>
      </div>
      <!-- Progress bar -->
      <div class="w-full h-2.5 rounded-full bg-border-muted overflow-hidden">
        <div class="h-full rounded-full transition-all duration-500 ease-out"
             :class="running ? 'progress-animated animate-progress-stripe' : ''"
             :style="'width: ' + overallPercent + '%; background: linear-gradient(90deg, ' + (overallFailed > 0 ? '#f85149' : '#3fb950') + ', ' + (overallFailed > 0 ? '#da3633' : '#238636') + ');'">
        </div>
      </div>
    </div>

    <!-- Per-suite progress items -->
    <div class="space-y-2">
      <template x-for="id in suiteOrder" :key="id">
        <div class="rounded-lg border overflow-hidden transition-all duration-200"
             :class="{
               'border-accent-blue bg-accent-blue/[0.03]': progress[id]?.status === 'running',
               'border-accent-green-dim/50': progress[id]?.status === 'pass',
               'border-accent-red-dim/50': progress[id]?.status === 'fail',
               'border-border-muted': !progress[id] || progress[id]?.status === 'pending',
             }">
          <!-- Suite header (click to expand) -->
          <div @click="toggleExpanded(id)"
               class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-surface-hover/50 transition-colors select-none">
            <!-- Status icon -->
            <div class="w-6 h-6 flex items-center justify-center flex-shrink-0">
              <template x-if="!progress[id] || progress[id]?.status === 'pending'">
                <i data-lucide="circle-dashed" class="w-5 h-5 text-faint"></i>
              </template>
              <template x-if="progress[id]?.status === 'running'">
                <i data-lucide="loader-2" class="w-5 h-5 text-accent-blue spinner-icon"></i>
              </template>
              <template x-if="progress[id]?.status === 'pass'">
                <i data-lucide="check-circle-2" class="w-5 h-5 text-accent-green"></i>
              </template>
              <template x-if="progress[id]?.status === 'fail'">
                <i data-lucide="x-circle" class="w-5 h-5 text-accent-red"></i>
              </template>
              <template x-if="progress[id]?.status === 'skipped'">
                <i data-lucide="skip-forward" class="w-5 h-5 text-faint"></i>
              </template>
            </div>

            <!-- Suite name -->
            <span class="font-semibold text-sm flex-1" x-text="suites[id]?.label || id"></span>

            <!-- Mini progress bar -->
            <div x-show="progress[id]?.status === 'running' && progress[id]?.total > 0"
                 class="w-24 h-1.5 rounded-full bg-border-muted overflow-hidden flex-shrink-0">
              <div class="h-full rounded-full bg-accent-blue transition-all duration-300"
                   :style="'width: ' + suitePercent(id) + '%'"></div>
            </div>

            <!-- Stats -->
            <div class="flex items-center gap-3 text-xs font-mono text-muted flex-shrink-0">
              <span x-show="progress[id] && (progress[id].passed > 0 || progress[id].failed > 0)"
                    x-text="progress[id]?.passed + '/' + (progress[id]?.passed + progress[id]?.failed + (progress[id]?.total > 0 ? progress[id]?.total - progress[id]?.passed - progress[id]?.failed : 0))">
              </span>
              <span x-show="progress[id]?.elapsed > 0" class="text-faint" x-text="formatDuration(progress[id]?.elapsed || 0)"></span>
            </div>

            <!-- Chevron -->
            <i data-lucide="chevron-down" class="w-4 h-4 text-faint transition-transform duration-200 flex-shrink-0"
               :class="expandedSuites.has(id) ? 'rotate-180' : ''"></i>
          </div>

          <!-- Expanded detail -->
          <div x-show="expandedSuites.has(id)" x-collapse
               class="border-t border-border-muted bg-surface">

            <!-- Test list -->
            <div x-show="progress[id]?.tests?.length > 0" class="max-h-[350px] overflow-y-auto">
              <template x-for="(test, ti) in (progress[id]?.tests || [])" :key="ti">
                <div>
                  <div class="flex items-start gap-2 px-4 py-2 text-sm border-b border-border-muted/50 hover:bg-surface-card/50 transition-colors">
                    <span class="flex-shrink-0 mt-0.5">
                      <i x-show="test.status === 'pass'" data-lucide="check" class="w-3.5 h-3.5 text-accent-green"></i>
                      <i x-show="test.status === 'fail'" data-lucide="x" class="w-3.5 h-3.5 text-accent-red"></i>
                      <i x-show="test.status === 'running'" data-lucide="loader-2" class="w-3.5 h-3.5 text-accent-blue spinner-icon"></i>
                    </span>
                    <span class="flex-1 text-xs break-words" :class="test.status === 'fail' ? 'text-accent-red' : 'text-gray-300'" x-text="test.name"></span>
                    <span x-show="test.group" class="text-[10px] px-1.5 py-0.5 rounded bg-border-muted text-faint font-mono flex-shrink-0" x-text="test.group"></span>
                    <span x-show="test.duration > 0" class="text-[11px] font-mono text-faint flex-shrink-0" x-text="formatMs(test.duration)"></span>
                  </div>
                  <!-- Failure detail -->
                  <div x-show="test.status === 'fail' && (test.expected || test.actual || test.message)"
                       class="mx-4 mb-2 mt-1 p-3 rounded-md bg-accent-red-bg border border-accent-red-dim/50 text-xs font-mono">
                    <template x-if="test.expected">
                      <div class="mb-1"><span class="text-muted font-semibold">Expected: </span><span class="text-accent-green" x-text="test.expected"></span></div>
                    </template>
                    <template x-if="test.actual">
                      <div class="mb-1"><span class="text-muted font-semibold">Actual: </span><span class="text-accent-red" x-text="test.actual"></span></div>
                    </template>
                    <template x-if="test.message && !test.expected && !test.actual">
                      <div class="text-accent-red" x-text="test.message"></div>
                    </template>
                  </div>
                </div>
              </template>
            </div>

            <!-- Stdout viewer -->
            <div x-show="progress[id]?.stdout?.length > 0"
                 class="border-t border-border-muted">
              <div @click="progress[id]._showStdout = !progress[id]._showStdout"
                   class="flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-surface-card/50 text-xs text-muted">
                <i data-lucide="terminal" class="w-3 h-3"></i>
                <span>Output</span>
                <span class="font-mono text-faint" x-text="'(' + (progress[id]?.stdout?.length || 0) + ' lines)'"></span>
                <i data-lucide="chevron-down" class="w-3 h-3 ml-auto transition-transform"
                   :class="progress[id]?._showStdout ? 'rotate-180' : ''"></i>
              </div>
              <div x-show="progress[id]?._showStdout"
                   class="px-4 pb-3 max-h-44 overflow-y-auto">
                <pre class="text-[11px] font-mono text-faint leading-relaxed whitespace-pre-wrap break-words"
                     x-text="(progress[id]?.stdout || []).join('\n')"></pre>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </section>

  <!-- ────────────────────────────────────────────────────────── -->
  <!-- RESULTS SECTION                                            -->
  <!-- ────────────────────────────────────────────────────────── -->
  <section x-show="showResultsSection" x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
           class="rounded-xl border border-border bg-surface-card p-5 space-y-5">

    <div class="flex items-center gap-2">
      <i data-lucide="bar-chart-3" class="w-4 h-4 text-muted"></i>
      <h2 class="text-xs font-semibold uppercase tracking-wider text-muted">Results</h2>
    </div>

    <!-- Metric cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="rounded-lg border border-border bg-surface p-4">
        <div class="text-xs text-muted mb-1">Total Tests</div>
        <div class="text-2xl font-bold font-mono text-gray-100" x-text="overallPassed + overallFailed"></div>
      </div>
      <div class="rounded-lg border border-border bg-surface p-4">
        <div class="text-xs text-muted mb-1">Pass Rate</div>
        <div class="text-2xl font-bold font-mono"
             :class="overallFailed === 0 ? 'text-accent-green' : 'text-accent-yellow'"
             x-text="((overallPassed + overallFailed) > 0 ? Math.round(overallPassed / (overallPassed + overallFailed) * 100) : 0) + '%'"></div>
      </div>
      <div class="rounded-lg border border-border bg-surface p-4">
        <div class="text-xs text-muted mb-1">Duration</div>
        <div class="text-2xl font-bold font-mono text-gray-100" x-text="formatDuration(elapsed)"></div>
      </div>
      <div class="rounded-lg border border-border bg-surface p-4">
        <div class="text-xs text-muted mb-1">Suites Run</div>
        <div class="text-2xl font-bold font-mono text-gray-100" x-text="suiteOrder.length"></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="rounded-lg border border-border bg-surface p-4">
        <div class="text-xs text-muted mb-3 font-semibold uppercase tracking-wide">Pass / Fail</div>
        <div class="flex justify-center" style="height: 200px;">
          <canvas x-ref="donutChart"></canvas>
        </div>
      </div>
      <div class="rounded-lg border border-border bg-surface p-4">
        <div class="text-xs text-muted mb-3 font-semibold uppercase tracking-wide">Suite Duration</div>
        <div style="height: 200px;">
          <canvas x-ref="barChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Results table -->
    <div class="rounded-lg border border-border overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-surface-raised">
            <th class="text-left px-4 py-3 text-xs font-semibold text-muted uppercase tracking-wide">Suite</th>
            <th class="text-right px-4 py-3 text-xs font-semibold text-muted uppercase tracking-wide">Passed</th>
            <th class="text-right px-4 py-3 text-xs font-semibold text-muted uppercase tracking-wide">Failed</th>
            <th class="text-right px-4 py-3 text-xs font-semibold text-muted uppercase tracking-wide">Rate</th>
            <th class="text-right px-4 py-3 text-xs font-semibold text-muted uppercase tracking-wide">Duration</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="id in suiteOrder" :key="id">
            <tr class="border-t border-border-muted hover:bg-surface-hover/50 transition-colors cursor-pointer"
                @click="toggleExpanded(id)"
                :class="{
                  'border-l-2 border-l-accent-green': progress[id]?.status === 'pass',
                  'border-l-2 border-l-accent-red': progress[id]?.status === 'fail',
                }">
              <td class="px-4 py-3 font-medium" x-text="suites[id]?.label || id"></td>
              <td class="px-4 py-3 text-right font-mono text-accent-green" x-text="progress[id]?.passed || 0"></td>
              <td class="px-4 py-3 text-right font-mono" :class="progress[id]?.failed > 0 ? 'text-accent-red' : 'text-faint'" x-text="progress[id]?.failed || 0"></td>
              <td class="px-4 py-3 text-right">
                <span class="inline-block px-2 py-0.5 rounded-full text-xs font-semibold font-mono"
                      :class="{
                        'bg-accent-green-bg text-accent-green': suitePassRate(id) === 100,
                        'bg-accent-yellow-bg text-accent-yellow': suitePassRate(id) >= 80 && suitePassRate(id) < 100,
                        'bg-accent-red-bg text-accent-red': suitePassRate(id) < 80,
                      }"
                      x-text="suitePassRate(id) + '%'"></span>
              </td>
              <td class="px-4 py-3 text-right font-mono text-muted" x-text="formatDuration(progress[id]?.elapsed || 0)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Action bar -->
    <div class="flex flex-wrap gap-3 pt-1">
      <button @click="openPromptfooUI()"
              class="flex items-center gap-2 px-3 py-2 rounded-lg border border-border bg-surface-card text-sm text-gray-300 hover:bg-surface-hover hover:border-faint transition-all">
        <i data-lucide="line-chart" class="w-4 h-4"></i> Promptfoo UI
      </button>
      <button @click="viewReports()"
              class="flex items-center gap-2 px-3 py-2 rounded-lg border border-border bg-surface-card text-sm text-gray-300 hover:bg-surface-hover hover:border-faint transition-all">
        <i data-lucide="file-text" class="w-4 h-4"></i> Reports
      </button>
      <button @click="exportJSONL()"
              class="flex items-center gap-2 px-3 py-2 rounded-lg border border-border bg-surface-card text-sm text-gray-300 hover:bg-surface-hover hover:border-faint transition-all">
        <i data-lucide="download" class="w-4 h-4"></i> Export JSONL
      </button>
      <button @click="runAgain()"
              class="flex items-center gap-2 px-3 py-2 rounded-lg border border-border bg-surface-card text-sm text-gray-300 hover:bg-surface-hover hover:border-faint transition-all">
        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Run Again
      </button>
    </div>
  </section>

</div>

<!-- ============================================================ -->
<!-- HISTORY SIDEBAR (slide-in overlay)                           -->
<!-- ============================================================ -->
<div x-show="showHistory" class="fixed inset-0 z-50" x-cloak>
  <!-- Backdrop -->
  <div @click="showHistory = false"
       x-show="showHistory"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
       class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
  <!-- Panel -->
  <div x-show="showHistory"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full"
       class="absolute top-0 right-0 w-[400px] max-w-full h-full bg-surface-card border-l border-border flex flex-col shadow-2xl shadow-black/50">
    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-border">
      <div class="flex items-center gap-2">
        <i data-lucide="history" class="w-4 h-4 text-muted"></i>
        <h3 class="text-sm font-semibold">Run History</h3>
        <span class="px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-border-muted text-muted" x-text="history.length"></span>
      </div>
      <button @click="showHistory = false" class="p-1 rounded-md text-muted hover:text-gray-200 hover:bg-surface-hover transition-all">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <!-- List -->
    <div class="flex-1 overflow-y-auto p-4 space-y-2">
      <template x-if="history.length === 0">
        <div class="text-center py-12 text-muted text-sm">
          <i data-lucide="inbox" class="w-8 h-8 mx-auto mb-3 text-faint"></i>
          <p>No previous runs</p>
        </div>
      </template>
      <template x-for="(run, i) in history" :key="run.id">
        <div @click="loadHistoryRun(run)"
             class="rounded-lg border border-border-muted p-4 cursor-pointer hover:border-faint hover:bg-surface-hover transition-all group">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-xs font-mono text-muted" x-text="formatHistoryDate(run.date)"></span>
            <span class="px-2 py-0.5 rounded-full text-[10px] font-semibold"
                  :class="run.totalFailed === 0 ? 'bg-accent-green-bg text-accent-green' : 'bg-accent-red-bg text-accent-red'"
                  x-text="run.totalFailed === 0 ? 'PASS' : run.totalFailed + ' FAIL'"></span>
          </div>
          <div class="text-xs text-faint mb-2 truncate" x-text="(run.suites || []).join(', ')"></div>
          <div class="flex items-center gap-4 text-xs">
            <span class="text-accent-green font-mono" x-text="run.totalPassed + ' passed'"></span>
            <span x-show="run.totalFailed > 0" class="text-accent-red font-mono" x-text="run.totalFailed + ' failed'"></span>
            <span class="text-faint font-mono ml-auto" x-text="run.duration ? formatDuration(run.duration) : ''"></span>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<!-- KEYBOARD SHORTCUT LISTENER                                   -->
<!-- ============================================================ -->
<div x-data @keydown.escape.window="showHistory = false"
     @keydown.meta.enter.window="canRun && startRun()"
     @keydown.ctrl.enter.window="canRun && startRun()">
</div>

<!-- ============================================================ -->
<!-- ALPINE.JS APPLICATION                                        -->
<!-- ============================================================ -->
<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('dashboard', () => ({
    // ── State ──────────────────────────────────────────────────
    binary: { path: '', version: '', exists: false },
    models: [],
    selectedModel: '',
    preflight: { version: null, metallib: null, relocated: null, bundle_module: null },
    preflightRunning: false,
    preflightChecks: [
      { key: 'version', label: 'Version' },
      { key: 'metallib', label: 'Metallib' },
      { key: 'relocated', label: 'Relocated' },
      { key: 'bundle_module', label: 'Bundle.module' },
    ],
    suites: {},
    selected: new Set(),
    suiteOptions: {},      // suite_id -> { key: value } user-configured options
    expandedOptions: new Set(),
    suiteOptionDefs: {
      'assertions-smoke': [
        { key: 'section', type: 'text', label: 'Section', default: '', placeholder: 'e.g. 5 (tools only)' },
        { key: 'grammar', type: 'toggle', label: 'Grammar constraints', default: true },
      ],
      'assertions-standard': [
        { key: 'section', type: 'text', label: 'Section', default: '', placeholder: 'e.g. 11 (XML tools)' },
        { key: 'grammar', type: 'toggle', label: 'Grammar constraints', default: true },
      ],
      'assertions-full': [
        { key: 'section', type: 'text', label: 'Section', default: '', placeholder: 'e.g. 9 (perf only)' },
        { key: 'grammar', type: 'toggle', label: 'Grammar constraints', default: true },
      ],
      'assertions-grammar': [
        { key: 'tier', type: 'select', label: 'Tier', default: 'full', values: ['smoke', 'standard', 'full'] },
        { key: 'forced_parser', type: 'select', label: 'Forced parser', default: 'qwen3_xml', values: ['qwen3_xml', 'hermes', 'none'] },
      ],
      'smart-analysis': [
        { key: 'judge', type: 'select', label: 'AI Judge', default: 'claude', values: ['claude', 'codex', 'claude,codex'] },
        { key: 'batch_mode', type: 'select', label: 'Batch mode', default: '1', values: ['0', '1'] },
        { key: 'tests', type: 'text', label: 'Tests', default: '', placeholder: 'e.g. 1,5,10 (empty=all)' },
      ],
      'promptfoo': [
        { key: 'mode', type: 'select', label: 'Suite', default: 'all', values: ['all', 'structured', 'structured-stress', 'toolcall', 'toolcall-quality', 'grammar-constraints', 'agentic', 'frameworks', 'opencode', 'pi', 'openclaw', 'hermes'] },
      ],
      'batch-correctness': [
        { key: 'batch_sizes', type: 'text', label: 'Batch sizes', default: '1,2,4,8', placeholder: '1,2,4,8' },
        { key: 'concurrent', type: 'text', label: 'Max concurrent', default: '8', placeholder: '8' },
      ],
      'batch-mixed': [
        { key: 'batch_sizes', type: 'text', label: 'Batch sizes', default: '1,2,4,8', placeholder: '1,2,4,8' },
        { key: 'concurrent', type: 'text', label: 'Max concurrent', default: '8', placeholder: '8' },
      ],
      'batch-multiturn': [
        { key: 'batch_sizes', type: 'text', label: 'Batch sizes', default: '1,2,4,8', placeholder: '1,2,4,8' },
        { key: 'concurrent', type: 'text', label: 'Max concurrent', default: '8', placeholder: '8' },
        { key: 'prefix_caching', type: 'toggle', label: 'Prefix caching', default: true },
      ],
      'openai-compat': [
        { key: 'port', type: 'text', label: 'Port', default: '9999', placeholder: '9999' },
      ],
      'guided-json': [
        { key: 'port', type: 'text', label: 'Port', default: '9999', placeholder: '9999' },
      ],
      'gpu-profile': [
        { key: 'max_tokens', type: 'text', label: 'Max tokens', default: '4096', placeholder: '4096' },
      ],
    },
    running: false,
    runId: null,
    suiteOrder: [],
    progress: {},      // id -> { status, passed, failed, total, tests, stdout, elapsed, _showStdout }
    overallPassed: 0,
    overallFailed: 0,
    elapsed: 0,
    startTime: null,
    _timerInterval: null,
    eventSource: null,
    expandedSuites: new Set(),
    showProgressSection: false,
    showResultsSection: false,
    showHistory: false,
    history: [],
    toasts: [],
    _toastId: 0,
    _donutChart: null,
    _barChart: null,

    // ── Computed ──────────────────────────────────────────────
    get selectedCount() { return this.selected.size; },
    get estimatedMinutes() {
      let total = 0;
      this.selected.forEach(id => { if (this.suites[id]) total += this.suites[id].estMin; });
      return total;
    },
    get allPreflightPassed() {
      return this.preflightChecks.every(c => {
        const r = this.preflight[c.key];
        return r && (r.status === 'pass' || r.status === 'warn');
      });
    },
    get canRun() {
      return this.selectedCount > 0 && !this.running;
    },
    get completedSuiteCount() {
      let c = 0;
      this.suiteOrder.forEach(id => {
        const p = this.progress[id];
        if (p && (p.status === 'pass' || p.status === 'fail' || p.status === 'skipped')) c++;
      });
      return c;
    },
    get overallPercent() {
      const total = this.suiteOrder.length;
      if (total === 0) return 0;
      let done = 0;
      let partial = 0;
      this.suiteOrder.forEach(id => {
        const p = this.progress[id];
        if (!p) return;
        if (p.status === 'pass' || p.status === 'fail' || p.status === 'skipped') {
          done++;
        } else if (p.status === 'running' && p.total > 0) {
          partial += (p.passed + p.failed) / p.total;
        }
      });
      return Math.min(100, Math.round(((done + partial) / total) * 100));
    },

    // ── Init ─────────────────────────────────────────────────
    async init() {
      this.loadHistory();
      this.loadSelectedPreference();
      await Promise.all([this.fetchBinary(), this.fetchModels(), this.fetchSuites()]);
      this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
    },

    // ── API Calls ────────────────────────────────────────────
    async apiFetch(path, opts = {}) {
      try {
        const res = await fetch(path, { ...opts, signal: AbortSignal.timeout?.(10000) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        console.warn('API ' + path + ':', e.message);
        return null;
      }
    },

    async fetchBinary() {
      const data = await this.apiFetch('/api/binary');
      if (data) {
        this.binary = { path: data.path || '', version: data.version || '', exists: data.exists || false };
        if (this.binary.exists && this.binary.path) {
          this.runPreflight();
        }
      }
    },

    async fetchModels() {
      const data = await this.apiFetch('/api/models');
      if (data && Array.isArray(data)) {
        this.models = data;
        // Auto-select first model
        if (this.models.length > 0 && !this.selectedModel) {
          this.selectedModel = this.models[0].id;
        }
      }
    },

    async fetchSuites() {
      const data = await this.apiFetch('/api/suites');
      if (data && Array.isArray(data)) {
        const s = {};
        data.forEach(d => {
          s[d.id] = {
            label: d.label,
            desc: this._suiteDescs[d.id] || '',
            est: d.est_minutes < 1 ? '~' + Math.round(d.est_minutes * 60) + 's' : '~' + d.est_minutes + ' min',
            estMin: d.est_minutes,
            port: d.port,
            needsServer: d.needs_server,
          };
        });
        this.suites = s;
      } else {
        // Fallback to hardcoded
        this.suites = this._fallbackSuites;
      }
      this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
    },

    // Suite descriptions (not returned from API)
    _suiteDescs: {
      'unit': 'Swift unit tests (XML parsing, batch, KV cache)',
      'assertions-smoke': 'Server, completion, stop, logprobs, think, tools',
      'assertions-standard': '+ streaming, cache, concurrent, XML, grammar, batch',
      'assertions-full': '+ performance (TTFT, tok/s, long context)',
      'assertions-grammar': 'Full tier x 2 with grammar constraints',
      'smart-analysis': '91 variants with Claude AI judge',
      'promptfoo': '137 tests x 8 server profiles',
      'batch-correctness': 'Known-answer at B={1,2,4,8}',
      'batch-mixed': 'Short+long decode with GPU metrics',
      'batch-multiturn': 'Prefix cache under concurrency',
      'openai-compat': 'Python SDK compatibility matrix',
      'guided-json': 'json_schema response format fixtures',
      'gpu-profile': 'Bandwidth, power, shader kernels',
    },

    _fallbackSuites: {
      'unit':                { label: 'Unit Tests',                   desc: 'Swift unit tests (XML parsing, batch, KV cache)',          est: '~5s',     estMin: 0.08, port: null },
      'assertions-smoke':    { label: 'Assertions (smoke)',           desc: 'Server, completion, stop, logprobs, think, tools',         est: '~2 min',  estMin: 2,    port: 9998 },
      'assertions-standard': { label: 'Assertions (standard)',        desc: '+ streaming, cache, concurrent, XML, grammar, batch',      est: '~5 min',  estMin: 5,    port: 9998 },
      'assertions-full':     { label: 'Assertions (full)',            desc: '+ performance (TTFT, tok/s, long context)',                est: '~15 min', estMin: 15,   port: 9998 },
      'assertions-grammar':  { label: 'Grammar + Forced Parser',     desc: 'Full tier x 2 with grammar constraints',                   est: '~30 min', estMin: 30,   port: 9998 },
      'smart-analysis':      { label: 'Smart Analysis',              desc: '91 variants with Claude AI judge',                         est: '~60 min', estMin: 60,   port: 9877 },
      'promptfoo':           { label: 'Promptfoo Evals',             desc: '137 tests x 8 server profiles',                            est: '~90 min', estMin: 90,   port: 9999 },
      'batch-correctness':   { label: 'Batch Correctness',           desc: 'Known-answer at B={1,2,4,8}',                              est: '~12 min', estMin: 12,   port: 9999 },
      'batch-mixed':         { label: 'Batch Mixed',                 desc: 'Short+long decode with GPU metrics',                       est: '~20 min', estMin: 20,   port: 9999 },
      'batch-multiturn':     { label: 'Batch Multiturn',             desc: 'Prefix cache under concurrency',                           est: '~20 min', estMin: 20,   port: 9999 },
      'openai-compat':       { label: 'OpenAI Compat',               desc: 'Python SDK compatibility matrix',                          est: '~8 min',  estMin: 8,    port: 9999 },
      'guided-json':         { label: 'Guided JSON',                 desc: 'json_schema response format fixtures',                     est: '~12 min', estMin: 12,   port: 9999 },
      'gpu-profile':         { label: 'GPU Profile',                 desc: 'Bandwidth, power, shader kernels',                         est: '~1 min',  estMin: 1,    port: null },
    },

    // ── Preflight ────────────────────────────────────────────
    async runPreflight() {
      if (!this.binary.path) return;
      this.preflightRunning = true;
      this.preflight = { version: null, metallib: null, relocated: null, bundle_module: null };
      const data = await this.apiFetch('/api/preflight?binary=' + encodeURIComponent(this.binary.path));
      if (data && !data.error) {
        this.preflight = data;
        // Normalize: ensure each has a status
        for (const key of ['version', 'metallib', 'relocated', 'bundle_module']) {
          if (this.preflight[key] && !this.preflight[key].status) {
            this.preflight[key].status = this.preflight[key].ok ? 'pass' : 'fail';
          }
        }
      } else {
        // Offline: mark as warn
        for (const key of ['version', 'metallib', 'relocated', 'bundle_module']) {
          this.preflight[key] = { status: 'warn', value: 'skipped (offline)' };
        }
      }
      this.preflightRunning = false;
    },

    onBinaryChange() {
      this.binary.exists = !!this.binary.path;
      if (this.binary.path) this.runPreflight();
    },

    // ── Suite Selection ──────────────────────────────────────
    // ── Suite Options ──────────────────────────────────────────
    toggleSuiteOptions(id) {
      if (this.expandedOptions.has(id)) {
        this.expandedOptions.delete(id);
      } else {
        this.expandedOptions.add(id);
      }
      // Force reactivity
      this.expandedOptions = new Set(this.expandedOptions);
      this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
    },
    getSuiteOpt(suiteId, key, defaultVal) {
      if (this.suiteOptions[suiteId] && this.suiteOptions[suiteId][key] !== undefined) {
        return this.suiteOptions[suiteId][key];
      }
      return defaultVal;
    },
    setSuiteOpt(suiteId, key, value) {
      if (!this.suiteOptions[suiteId]) this.suiteOptions[suiteId] = {};
      this.suiteOptions[suiteId][key] = value;
      // Force reactivity on nested object
      this.suiteOptions = { ...this.suiteOptions };
    },

    toggleSuite(id) {
      if (this.selected.has(id)) {
        this.selected.delete(id);
      } else {
        this.selected.add(id);
      }
      // Force reactivity
      this.selected = new Set(this.selected);
      this.saveSelectedPreference();
    },
    selectAll() {
      Object.keys(this.suites).forEach(id => this.selected.add(id));
      this.selected = new Set(this.selected);
      this.saveSelectedPreference();
    },
    deselectAll() {
      this.selected = new Set();
      this.saveSelectedPreference();
    },

    suiteIcon(id) {
      const icons = {
        'unit': 'box',
        'assertions-smoke': 'zap',
        'assertions-standard': 'shield-check',
        'assertions-full': 'shield',
        'assertions-grammar': 'braces',
        'smart-analysis': 'brain',
        'promptfoo': 'target',
        'batch-correctness': 'layers',
        'batch-mixed': 'shuffle',
        'batch-multiturn': 'messages-square',
        'openai-compat': 'plug',
        'guided-json': 'file-json',
        'gpu-profile': 'cpu',
      };
      return icons[id] || 'test-tube';
    },

    // ── Run Management ───────────────────────────────────────
    async startRun() {
      if (this.running || this.selectedCount === 0) return;

      const suites = [];
      this.selected.forEach(s => suites.push(s));

      this.running = true;
      this.runId = Date.now().toString(36);
      this.startTime = Date.now();
      this.suiteOrder = suites;
      this.overallPassed = 0;
      this.overallFailed = 0;
      this.elapsed = 0;
      this.expandedSuites = new Set();
      this.showProgressSection = true;
      this.showResultsSection = false;

      // Init progress for each suite
      const p = {};
      suites.forEach(id => {
        p[id] = {
          status: 'pending', passed: 0, failed: 0, total: 0,
          tests: [], stdout: [], elapsed: 0, startTime: null,
          _showStdout: false,
        };
      });
      this.progress = p;

      this.startTimer();
      this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });

      // Collect per-suite options (only for selected suites that have options configured)
      const options = {};
      suites.forEach(id => {
        const defs = this.suiteOptionDefs[id];
        if (defs) {
          const opts = {};
          defs.forEach(def => {
            const val = this.getSuiteOpt(id, def.key, def.default);
            if (val !== def.default && val !== '' && val !== false) {
              opts[def.key] = val;
            }
            // Always send toggles that are explicitly set
            if (def.type === 'toggle' && this.suiteOptions[id] && this.suiteOptions[id][def.key] !== undefined) {
              opts[def.key] = this.suiteOptions[id][def.key];
            }
          });
          if (Object.keys(opts).length > 0) options[id] = opts;
        }
      });

      const body = {
        binary: this.binary.path,
        model: this.selectedModel,
        suites: suites,
        options: options,
      };

      const res = await this.apiFetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (res && res.run_id) {
        this.runId = res.run_id;
        this.connectSSE();
      } else {
        // Offline demo mode
        this.toast('Running in demo mode (API offline)', 'info');
        this.simulateRun(suites);
      }
    },

    async stopRun() {
      if (!this.running) return;
      await this.apiFetch('/api/stop', { method: 'POST' });
      this.finishRun(true);
      this.toast('Run stopped', 'error');
    },

    // ── SSE ──────────────────────────────────────────────────
    connectSSE() {
      if (this.eventSource) this.eventSource.close();
      this.eventSource = new EventSource('/api/events');

      this.eventSource.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          this.handleEvent(data);
        } catch (e) {
          console.warn('SSE parse error:', e);
        }
      };

      this.eventSource.onerror = () => {
        if (this.running) {
          setTimeout(() => { if (this.running) this.connectSSE(); }, 2000);
        }
      };
    },

    handleEvent(ev) {
      const suite = ev.suite || ev.suite_id;
      const sr = suite ? this.progress[suite] : null;

      switch (ev.type) {
        case 'suite_start':
          if (sr) {
            sr.status = 'running';
            sr.total = ev.total || 0;
            sr.startTime = Date.now();
            this.expandedSuites.add(suite);
            this.expandedSuites = new Set(this.expandedSuites);
          }
          break;

        case 'test_pass':
          if (sr) {
            sr.passed++;
            this.overallPassed++;
            sr.tests.push({
              name: ev.name || ev.test || '',
              status: 'pass',
              duration: ev.duration || 0,
              group: ev.group || '',
            });
          }
          break;

        case 'test_fail':
          if (sr) {
            sr.failed++;
            this.overallFailed++;
            sr.tests.push({
              name: ev.name || ev.test || '',
              status: 'fail',
              duration: ev.duration || 0,
              group: ev.group || '',
              expected: ev.expected || '',
              actual: ev.actual || '',
              message: ev.message || ev.error || '',
            });
            this.toast('FAIL: ' + (ev.name || ev.test || 'Unknown test'), 'error', 5000);
          }
          break;

        case 'suite_end':
          if (sr) {
            sr.status = sr.failed > 0 ? 'fail' : 'pass';
            sr.elapsed = ev.duration_s || ev.duration || (sr.startTime ? (Date.now() - sr.startTime) / 1000 : 0);
            sr.total = sr.passed + sr.failed + (ev.skipped || 0);
            // Collapse after completion
            this.expandedSuites.delete(suite);
            this.expandedSuites = new Set(this.expandedSuites);
          }
          break;

        case 'stdout':
          if (sr) {
            sr.stdout.push(ev.line || ev.text || '');
            if (sr.stdout.length > 100) sr.stdout = sr.stdout.slice(-100);
          }
          break;

        case 'server_log':
          // Could display server logs separately, for now add to relevant suites
          break;

        case 'server_ready':
          this.toast('Server ready on port ' + (ev.port || ''), 'success');
          break;

        case 'server_timeout':
          this.toast('Server timed out on port ' + (ev.port || ''), 'error');
          break;

        case 'done':
          this.finishRun(false);
          return;
      }

      // Trigger reactivity
      this.progress = { ...this.progress };
      this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
    },

    // ── Timer ────────────────────────────────────────────────
    startTimer() {
      this.stopTimer();
      this._timerInterval = setInterval(() => {
        if (!this.running || !this.startTime) return;
        this.elapsed = (Date.now() - this.startTime) / 1000;
        // Update running suite elapsed
        this.suiteOrder.forEach(id => {
          const p = this.progress[id];
          if (p && p.status === 'running' && p.startTime) {
            p.elapsed = (Date.now() - p.startTime) / 1000;
          }
        });
      }, 1000);
    },
    stopTimer() {
      if (this._timerInterval) { clearInterval(this._timerInterval); this._timerInterval = null; }
    },

    // ── Finish Run ───────────────────────────────────────────
    finishRun(stopped) {
      this.running = false;
      this.stopTimer();
      if (this.eventSource) { this.eventSource.close(); this.eventSource = null; }

      this.suiteOrder.forEach(id => {
        const sr = this.progress[id];
        if (!sr) return;
        if (sr.status === 'pending') sr.status = stopped ? 'skipped' : 'pass';
        if (sr.status === 'running') sr.status = stopped ? 'skipped' : (sr.failed > 0 ? 'fail' : 'pass');
      });
      this.progress = { ...this.progress };

      this.showResultsSection = true;
      this.$nextTick(() => {
        this.renderCharts();
        if (typeof lucide !== 'undefined') lucide.createIcons();
      });

      // Save to history
      const entry = {
        id: this.runId,
        date: new Date().toISOString(),
        binary: this.binary.path,
        model: this.selectedModel,
        suites: [...this.suiteOrder],
        totalPassed: this.overallPassed,
        totalFailed: this.overallFailed,
        duration: this.elapsed,
        stopped: stopped,
      };
      this.history.unshift(entry);
      if (this.history.length > 50) this.history = this.history.slice(0, 50);
      this.saveHistory();

      if (!stopped) {
        const allPassed = this.overallFailed === 0;
        this.toast(
          allPassed
            ? 'All ' + this.overallPassed + ' tests passed'
            : this.overallFailed + ' failure' + (this.overallFailed !== 1 ? 's' : '') + ' out of ' + (this.overallPassed + this.overallFailed),
          allPassed ? 'success' : 'error',
          6000
        );
      }
    },

    // ── Simulation (offline demo mode) ───────────────────────
    simulateRun(suites) {
      let idx = 0;
      const runNext = () => {
        if (idx >= suites.length || !this.running) { this.finishRun(false); return; }
        const id = suites[idx];
        const sr = this.progress[id];
        const testCount = 5 + Math.floor(Math.random() * 20);
        sr.status = 'running';
        sr.total = testCount;
        sr.startTime = Date.now();
        this.expandedSuites.add(id);
        this.expandedSuites = new Set(this.expandedSuites);
        this.progress = { ...this.progress };

        let ti = 0;
        const interval = setInterval(() => {
          if (!this.running || ti >= testCount) {
            clearInterval(interval);
            sr.status = sr.failed > 0 ? 'fail' : 'pass';
            sr.elapsed = (Date.now() - sr.startTime) / 1000;
            this.expandedSuites.delete(id);
            this.expandedSuites = new Set(this.expandedSuites);
            this.progress = { ...this.progress };
            idx++;
            setTimeout(runNext, 200);
            return;
          }
          const isFail = Math.random() < 0.05;
          const name = 'test_' + id + '_' + (ti + 1);
          const dur = 50 + Math.random() * 800;
          if (isFail) {
            sr.failed++;
            this.overallFailed++;
            sr.tests.push({ name, status: 'fail', duration: dur, group: 'Demo', expected: 'expected value', actual: 'actual value', message: 'Simulated failure' });
          } else {
            sr.passed++;
            this.overallPassed++;
            sr.tests.push({ name, status: 'pass', duration: dur, group: 'Demo' });
          }
          sr.stdout.push('[' + new Date().toISOString().slice(11, 19) + '] ' + (isFail ? 'FAIL' : 'PASS') + ' ' + name);
          if (sr.stdout.length > 100) sr.stdout = sr.stdout.slice(-100);
          ti++;
          this.progress = { ...this.progress };
          this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
        }, 100);
      };
      setTimeout(runNext, 300);
    },

    // ── Charts ───────────────────────────────────────────────
    renderCharts() {
      this.renderDonutChart();
      this.renderBarChart();
    },

    renderDonutChart() {
      const canvas = this.$refs.donutChart;
      if (!canvas) return;
      if (this._donutChart) this._donutChart.destroy();

      this._donutChart = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: ['Passed', 'Failed'],
          datasets: [{
            data: [this.overallPassed, this.overallFailed],
            backgroundColor: ['#3fb950', '#f85149'],
            borderColor: ['#238636', '#da3633'],
            borderWidth: 2,
            hoverOffset: 6,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '65%',
          plugins: {
            legend: { display: true, position: 'bottom', labels: { color: '#8b949e', font: { size: 11 }, padding: 16, usePointStyle: true, pointStyleWidth: 8 } },
            tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1, titleColor: '#e6edf3', bodyColor: '#8b949e', padding: 10, cornerRadius: 8 },
          },
        },
      });
    },

    renderBarChart() {
      const canvas = this.$refs.barChart;
      if (!canvas) return;
      if (this._barChart) this._barChart.destroy();

      const labels = [];
      const data = [];
      const colors = [];
      this.suiteOrder.forEach(id => {
        const p = this.progress[id];
        labels.push(this.suites[id]?.label || id);
        data.push(p?.elapsed || 0);
        colors.push(p?.status === 'fail' ? '#f85149' : '#58a6ff');
      });

      this._barChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colors,
            borderRadius: 4,
            barThickness: 20,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1,
              titleColor: '#e6edf3', bodyColor: '#8b949e', padding: 10, cornerRadius: 8,
              callbacks: { label: (ctx) => this.formatDuration(ctx.raw) },
            },
          },
          scales: {
            x: {
              grid: { color: '#21262d' },
              ticks: { color: '#8b949e', font: { size: 10, family: '"SF Mono", monospace' }, callback: (v) => this.formatDuration(v) },
            },
            y: {
              grid: { display: false },
              ticks: { color: '#8b949e', font: { size: 11 } },
            },
          },
        },
      });
    },

    // ── Actions ──────────────────────────────────────────────
    async openPromptfooUI() {
      const res = await this.apiFetch('/api/promptfoo-view', { method: 'POST' });
      if (res && res.url) {
        window.open(res.url, '_blank');
      } else {
        this.toast('Could not start Promptfoo UI', 'warning');
      }
    },

    viewReports() {
      window.open('/api/reports/', '_blank');
    },

    exportJSONL() {
      if (this.runId) {
        window.open('/api/results/' + this.runId, '_blank');
      } else {
        this.toast('No run data to export', 'warning');
      }
    },

    runAgain() {
      this.showResultsSection = false;
      this.showProgressSection = false;
      this.$nextTick(() => this.startRun());
    },

    // ── History ──────────────────────────────────────────────
    loadHistory() {
      try {
        const raw = localStorage.getItem('afm-dashboard-history');
        if (raw) this.history = JSON.parse(raw);
      } catch (e) { this.history = []; }
    },
    saveHistory() {
      try { localStorage.setItem('afm-dashboard-history', JSON.stringify(this.history)); } catch (e) {}
    },
    loadHistoryRun(run) {
      // Restore from API if available, otherwise just show metadata
      this.showHistory = false;
      this.suiteOrder = run.suites || [];
      this.overallPassed = run.totalPassed || 0;
      this.overallFailed = run.totalFailed || 0;
      this.elapsed = run.duration || 0;
      this.runId = run.id;

      // Build minimal progress from what we have
      const p = {};
      this.suiteOrder.forEach(id => {
        p[id] = {
          status: run.totalFailed > 0 ? 'fail' : 'pass',
          passed: 0, failed: 0, total: 0,
          tests: [], stdout: [], elapsed: 0,
          _showStdout: false,
        };
      });
      this.progress = p;

      this.showProgressSection = true;
      this.showResultsSection = true;
      this.$nextTick(() => {
        this.renderCharts();
        if (typeof lucide !== 'undefined') lucide.createIcons();
      });
    },

    // ── localStorage preferences ─────────────────────────────
    saveSelectedPreference() {
      try { localStorage.setItem('afm-dashboard-selected', JSON.stringify([...this.selected])); } catch (e) {}
    },
    loadSelectedPreference() {
      try {
        const raw = localStorage.getItem('afm-dashboard-selected');
        if (raw) this.selected = new Set(JSON.parse(raw));
      } catch (e) {}
    },

    // ── Utility ──────────────────────────────────────────────
    formatDuration(seconds) {
      if (!seconds || seconds <= 0) return '0s';
      if (seconds < 60) return Math.round(seconds) + 's';
      const m = Math.floor(seconds / 60);
      const s = Math.round(seconds % 60);
      if (m < 60) return s > 0 ? m + 'm ' + s + 's' : m + 'm';
      const h = Math.floor(m / 60);
      const rm = m % 60;
      return rm > 0 ? h + 'h ' + rm + 'm' : h + 'h';
    },

    formatMs(ms) {
      if (!ms) return '';
      if (ms < 1000) return Math.round(ms) + 'ms';
      return (ms / 1000).toFixed(1) + 's';
    },

    formatHistoryDate(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
               d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      } catch (e) { return iso; }
    },

    suitePercent(id) {
      const p = this.progress[id];
      if (!p || p.total <= 0) return 0;
      return Math.round(((p.passed + p.failed) / p.total) * 100);
    },

    suitePassRate(id) {
      const p = this.progress[id];
      if (!p) return 0;
      const total = p.passed + p.failed;
      if (total === 0) return 0;
      return Math.round((p.passed / total) * 100);
    },

    toggleExpanded(id) {
      if (this.expandedSuites.has(id)) {
        this.expandedSuites.delete(id);
      } else {
        this.expandedSuites.add(id);
      }
      this.expandedSuites = new Set(this.expandedSuites);
    },

    toast(message, type = 'info', duration = 4000) {
      const id = ++this._toastId;
      const t = { id, message, type, visible: true };
      this.toasts.push(t);
      this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
      setTimeout(() => {
        t.visible = false;
        setTimeout(() => { this.toasts = this.toasts.filter(x => x.id !== id); }, 300);
      }, duration);
    },
  }));
});
