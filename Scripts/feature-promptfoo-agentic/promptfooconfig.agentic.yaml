# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "AFM multi-turn agentic suite"

prompts:
  - "{{prompt}}"

providers:
  - id: providers/afm_provider.mjs
    label: afm-default-agentic
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_DEFAULT
      modelEnv: AFM_MODEL
      extract: normalized_message

  - id: providers/afm_provider.mjs
    label: afm-adaptive-xml-agentic
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_ADAPTIVE_XML
      modelEnv: AFM_MODEL
      extract: normalized_message

  - id: providers/afm_provider.mjs
    label: afm-adaptive-xml-grammar-agentic
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_ADAPTIVE_XML_GRAMMAR
      modelEnv: AFM_MODEL
      extract: normalized_message

tests: file://datasets/agentic/coding-workflows.yaml
