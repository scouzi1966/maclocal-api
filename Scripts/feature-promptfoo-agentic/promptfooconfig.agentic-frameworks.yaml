# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "AFM agent framework tool-schema suite"

prompts:
  - "{{prompt}}"

providers:
  - id: providers/afm_provider.mjs
    label: afm-default-frameworks
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_DEFAULT
      modelEnv: AFM_MODEL
      extract: normalized_message

  - id: providers/afm_provider.mjs
    label: afm-adaptive-xml-frameworks
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_ADAPTIVE_XML
      modelEnv: AFM_MODEL
      extract: normalized_message

  - id: providers/afm_provider.mjs
    label: afm-adaptive-xml-grammar-frameworks
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_ADAPTIVE_XML_GRAMMAR
      modelEnv: AFM_MODEL
      extract: normalized_message

tests: file://datasets/agentic/framework-tool-schemas.yaml
