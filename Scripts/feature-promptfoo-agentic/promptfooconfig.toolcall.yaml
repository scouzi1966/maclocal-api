# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "AFM tool-calling suite"

prompts:
  - "{{prompt}}"

providers:
  - id: providers/afm_provider.mjs
    label: afm-default
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_DEFAULT
      modelEnv: AFM_MODEL
      extract: tool_calls

  - id: providers/afm_provider.mjs
    label: afm-adaptive-xml
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_ADAPTIVE_XML
      modelEnv: AFM_MODEL
      extract: tool_calls

  - id: providers/afm_provider.mjs
    label: afm-adaptive-xml-grammar
    config:
      transport: api
      baseUrlEnv: AFM_BASE_URL_ADAPTIVE_XML_GRAMMAR
      modelEnv: AFM_MODEL
      extract: tool_calls

tests: file://datasets/toolcall-core.yaml
