- description: "tool_choice required selects weather tool"
  vars:
    prompt: "What is the weather in Berlin?"
    tools:
      - type: function
        function:
          name: get_weather
          description: "Get weather for a location"
          parameters:
            type: object
            properties:
              location:
                type: string
            required: [location]
    tool_choice: required
  assert:
    - type: is-json
    - type: contains
      value: "\"get_weather\""
    - type: contains
      value: "\"location\""

- description: "tool_choice none suppresses tool call"
  vars:
    prompt: "What is the weather in Sydney?"
    tools:
      - type: function
        function:
          name: get_weather
          description: "Get weather for a location"
          parameters:
            type: object
            properties:
              location:
                type: string
            required: [location]
    tool_choice: none
  assert:
    - type: equals
      value: "[]"

- description: "multi-tool picks get_time"
  vars:
    prompt: "What time is it in New York right now?"
    tools:
      - type: function
        function:
          name: get_weather
          description: "Get weather for a location"
          parameters:
            type: object
            properties:
              location:
                type: string
            required: [location]
      - type: function
        function:
          name: get_time
          description: "Get current time for a timezone"
          parameters:
            type: object
            properties:
              timezone:
                type: string
            required: [timezone]
  assert:
    - type: is-json
    - type: contains
      value: "\"get_time\""

- description: "typed args bool and int coercion"
  vars:
    prompt: "Search for 'main' case-sensitively, return max 5 results."
    tools:
      - type: function
        function:
          name: search_code
          description: "Search codebase for a pattern"
          parameters:
            type: object
            properties:
              query:
                type: string
              case_sensitive:
                type: boolean
              max_results:
                type: integer
            required: [query]
  assert:
    - type: is-json
    - type: contains
      value: "\"search_code\""
    - type: contains
      value: "\"query\""

- description: "array of objects argument coercion"
  vars:
    prompt: "Ask the user 2 questions: What is your favorite color (red, blue, green) and what is your favorite animal (cat, dog, fish)."
    tools:
      - type: function
        function:
          name: ask_questions
          description: "Ask user multiple-choice questions"
          parameters:
            type: object
            properties:
              questions:
                type: array
                items:
                  type: object
                  properties:
                    text:
                      type: string
                    options:
                      type: array
                      items:
                        type: string
              title:
                type: string
            required: [questions, title]
  assert:
    - type: is-json
    - type: contains
      value: "\"ask_questions\""
    - type: contains
      value: "\"questions\""

- description: "float number coercion"
  vars:
    prompt: "Set the thermostat to 22.5 degrees celsius and enable it."
    tools:
      - type: function
        function:
          name: set_temperature
          description: "Set thermostat temperature"
          parameters:
            type: object
            properties:
              celsius:
                type: number
              enabled:
                type: boolean
            required: [celsius, enabled]
  assert:
    - type: is-json
    - type: contains
      value: "\"set_temperature\""
    - type: contains
      value: "\"celsius\""

- description: "hallucination resistance with similar tools"
  vars:
    prompt: "Create a task to document the grammar constraint feature."
    tools:
      - type: function
        function:
          name: listTasks
          description: "List current tasks"
          parameters:
            type: object
            properties:
              status:
                type: string
      - type: function
        function:
          name: createTask
          description: "Create a new task"
          parameters:
            type: object
            properties:
              content:
                type: string
              priority:
                type: string
            required: [content]
  assert:
    - type: is-json
    - type: contains
      value: "\"createTask\""
