- description: "hermes/web_search recent cache articles"
  metadata:
    <<: *hermes_meta
  vars:
    prompt: "Search the web for recent MLX prompt cache issues from the past week."
    tools:
      - type: function
        function:
          name: web_search
          description: "Search the web for information"
          parameters:
            type: object
            properties:
              query:
                type: string
              limit:
                type: integer
            required: [query]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const query = String(parsed.tool_calls[0]?.function?.arguments?.query || '');
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'web_search' &&
          /MLX|prompt cache/i.test(query);

- description: "hermes/web_extract fetch docs"
  metadata:
    <<: *hermes_meta
  vars:
    prompt: "Extract the readable content from https://opencode.ai/docs/tools/."
    tools:
      - type: function
        function:
          name: web_extract
          description: "Extract content from specific web pages"
          parameters:
            type: object
            properties:
              urls:
                type: array
                items:
                  type: string
              format:
                type: string
            required: [urls]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const urls = parsed.tool_calls[0]?.function?.arguments?.urls || [];
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'web_extract' &&
          Array.isArray(urls) &&
          urls.some((url) => /https:\/\/opencode\.ai\/docs\/tools\/?/.test(String(url)));

