          description: "Type into a browser field"
          parameters:
            type: object
            properties:
              element:
                type: string
              text:
                type: string
            required: [element, text]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
