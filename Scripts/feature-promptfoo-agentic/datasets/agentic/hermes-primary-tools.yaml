          parameters:
            type: object
            properties:
              path:
                type: string
              old_text:
                type: string
              new_text:
                type: string
            required: [path, old_text, new_text]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'patch' &&
          /README\.md$/.test(String(args.path || ''));

