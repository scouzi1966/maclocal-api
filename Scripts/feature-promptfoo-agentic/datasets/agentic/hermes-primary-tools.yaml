- description: "hermes/read_file inspect controller"
  metadata: &hermes_meta
    suite: hermes_primary
    source_type: primary_source
    source_urls:
      - "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/AGENTS.md"
      - "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/hermes_cli/tools_config.py"
      - "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/tools/file_tools.py"
      - "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/tools/web_tools.py"
      - "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/tools/browser_tool.py"
      - "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/tools/delegate_tool.py"
    framework: Hermes
    classification: not_yet_classified
  vars:
    prompt: "Read Sources/MacLocalAPI/Controllers/MLXChatCompletionsController.swift."
    system_prompt: "You are a Hermes-style agent using only documented Hermes tools."
    tools:
      - type: function
        function:
          name: read_file
          description: "Read a file with pagination"
          parameters:
            type: object
            properties:
              path:
                type: string
              offset:
                type: integer
              limit:
                type: integer
            required: [path]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'read_file' &&
          /MLXChatCompletionsController\.swift$/.test(String(parsed.tool_calls[0].function.arguments.path || ''));

- description: "hermes/read_file inspect line window"
  metadata:
    <<: *hermes_meta
  vars:
    prompt: "Open Sources/MacLocalAPI/Models/MLXModelService.swift around line 400."
    tools:
      - type: function
        function:
          name: read_file
          description: "Read a file with pagination"
          parameters:
            type: object
            properties:
              path:
                type: string
              offset:
                type: integer
              limit:
                type: integer
            required: [path]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'read_file' &&
          /MLXModelService\.swift$/.test(String(args.path || '')) &&
          (args.offset !== undefined || args.limit !== undefined);

- description: "hermes/write_file create markdown report"
  metadata:
    <<: *hermes_meta
  vars:
    prompt: "Create docs/hermes-status.md with a short markdown status report."
    tools:
      - type: function
        function:
          name: write_file
          description: "Write or overwrite a file"
          parameters:
            type: object
            properties:
              path:
                type: string
              content:
                type: string
            required: [path, content]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'write_file' &&
          /docs\/hermes-status\.md$/.test(String(args.path || '')) &&
          /#|status/i.test(String(args.content || ''));

- description: "hermes/patch surgical update"
