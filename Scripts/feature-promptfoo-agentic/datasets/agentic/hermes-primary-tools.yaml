  vars:
    prompt: "Delegate a focused subtask to investigate current MLX prompt cache bugs and report back."
    tools:
      - type: function
        function:
          name: delegate_task
          description: "Delegate a focused task to a subagent"
          parameters:
            type: object
            properties:
              goal:
                type: string
              context:
                type: string
              toolsets:
                type: array
                items:
                  type: string
            required: [goal]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'delegate_task' &&
          /prompt cache|MLX/i.test(String(args.goal || ''));
