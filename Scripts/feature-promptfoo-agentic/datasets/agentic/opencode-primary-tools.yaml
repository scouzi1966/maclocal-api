- description: "opencode/bash run git status"
  metadata: &opencode_meta
    suite: opencode_primary
    source_type: primary_source
    source_url: "https://opencode.ai/docs/tools/"
    framework: OpenCode
    classification: not_yet_classified
  vars:
    prompt: "Check whether the repository has uncommitted changes."
    system_prompt: "You are a coding agent using only OpenCode built-in tools."
    tools:
      - type: function
        function:
          name: bash
          description: "Execute shell commands in the project environment"
          parameters:
            type: object
            properties:
              command:
                type: string
            required: [command]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'bash' &&
          /git status/.test(String(parsed.tool_calls[0].function.arguments.command || ''));

- description: "opencode/bash run targeted build"
  metadata:
    <<: *opencode_meta
  vars:
    prompt: "Build the Swift package in release mode."
    tools:
      - type: function
        function:
          name: bash
          description: "Execute shell commands in the project environment"
          parameters:
            type: object
            properties:
              command:
                type: string
            required: [command]
      - type: function
        function:
          name: read
          description: "Read file contents"
          parameters:
            type: object
            properties:
              file_path:
                type: string
            required: [file_path]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'bash' &&
          /(swift build -c release|make build)/.test(String(parsed.tool_calls[0].function.arguments.command || ''));

