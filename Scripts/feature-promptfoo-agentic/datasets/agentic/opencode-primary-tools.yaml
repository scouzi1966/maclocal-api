  vars:
    prompt: "In src/controllers/cache_controller.py, replace cache: MISS with cache: MISS suffix=41."
    tools:
      - type: function
        function:
          name: edit
          description: "Modify existing files using exact string replacements"
          parameters:
            type: object
            properties:
              file_path:
                type: string
              old_string:
                type: string
              new_string:
                type: string
            required: [file_path, old_string, new_string]
      - type: function
        function:
          name: write
          description: "Create new files or overwrite existing ones"
          parameters:
            type: object
            properties:
              file_path:
                type: string
              content:
                type: string
            required: [file_path, content]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'edit' &&
          /cache: MISS/.test(String(args.old_string || '')) &&
          /suffix=41/.test(String(args.new_string || ''));

