          parameters:
            type: object
            properties:
              file_path:
                type: string
              old_string:
                type: string
              new_string:
                type: string
            required: [file_path, old_string, new_string]
      - type: function
        function:
          name: write
          description: "Create new files or overwrite existing ones"
          parameters:
            type: object
            properties:
              file_path:
                type: string
              content:
                type: string
            required: [file_path, content]
  assert:
    - type: javascript
