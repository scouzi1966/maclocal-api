- description: "pi/bash check repo status"
  metadata: &pi_meta
    suite: pi_primary
    source_type: primary_source
    source_urls:
      - "https://raw.githubusercontent.com/badlogic/pi-mono/main/packages/coding-agent/README.md"
      - "https://raw.githubusercontent.com/badlogic/pi-mono/main/packages/coding-agent/src/core/tools/index.ts"
      - "https://raw.githubusercontent.com/badlogic/pi-mono/main/packages/coding-agent/src/core/tools/bash.ts"
    framework: Pi
    classification: not_yet_classified
  vars:
    prompt: "Check whether the repository has uncommitted changes."
    system_prompt: "You are a coding agent using only Pi built-in tools."
    tools:
      - type: function
        function:
          name: bash
          description: "Execute a bash command"
          parameters:
            type: object
            properties:
              command:
                type: string
              timeout:
                type: number
            required: [command]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'bash' &&
          /git status/.test(String(parsed.tool_calls[0].function.arguments.command || ''));

- description: "pi/bash run release build"
  metadata:
