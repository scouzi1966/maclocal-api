          parameters:
            type: object
            properties:
              command:
                type: string
              timeout:
                type: number
            required: [command]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'bash' &&
          /(swift build -c release|make build)/.test(String(parsed.tool_calls[0].function.arguments.command || ''));

