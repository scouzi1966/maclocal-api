          parameters:
            type: object
            properties:
              url:
                type: string
              format:
                type: string
            required: [url]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const url = String(parsed.tool_calls[0]?.function?.arguments?.url || '');
