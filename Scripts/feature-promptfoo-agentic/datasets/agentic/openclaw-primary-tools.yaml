- description: "openclaw/exec run git status"
  metadata: &openclaw_meta
    suite: openclaw_primary
    source_type: primary_source
    source_urls:
      - "https://raw.githubusercontent.com/openclaw/openclaw/main/docs/tools/exec.md"
      - "https://raw.githubusercontent.com/openclaw/openclaw/main/docs/tools/apply-patch.md"
      - "https://raw.githubusercontent.com/openclaw/openclaw/main/docs/tools/web.md"
      - "https://raw.githubusercontent.com/openclaw/openclaw/main/docs/tools/browser.md"
    framework: OpenClaw
    classification: not_yet_classified
  vars:
    prompt: "Check whether the repository has uncommitted changes."
    system_prompt: "You are an OpenClaw-style coding agent using only documented OpenClaw tools."
    tools:
      - type: function
        function:
          name: exec
          description: "Run shell commands in the workspace"
          parameters:
            type: object
            properties:
              command:
                type: string
              workdir:
                type: string
              timeout:
                type: integer
            required: [command]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'exec' &&
          /git status/.test(String(args.command || ''));

- description: "openclaw/exec targeted release build"
  metadata:
    <<: *openclaw_meta
  vars:
    prompt: "Build the Swift package in release mode from the repository root."
    tools:
      - type: function
        function:
          name: exec
          description: "Run shell commands in the workspace"
          parameters:
            type: object
            properties:
              command:
                type: string
              workdir:
                type: string
            required: [command]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const command = String(parsed.tool_calls[0]?.function?.arguments?.command || '');
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'exec' &&
          /(swift build -c release|make build)/.test(command);

- description: "openclaw/exec background build with yield"
  metadata:
    <<: *openclaw_meta
  vars:
    prompt: "Kick off npm run build, let it run briefly, and keep the session around so we can poll it later."
    tools:
      - type: function
        function:
          name: exec
          description: "Run shell commands in the workspace"
          parameters:
            type: object
            properties:
              command:
                type: string
              yieldMs:
                type: integer
              background:
                type: boolean
            required: [command]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'exec' &&
          /npm run build/.test(String(args.command || '')) &&
          (args.background === true || args.yieldMs !== undefined);

- description: "openclaw/apply_patch add file"
  metadata:
    <<: *openclaw_meta
  vars:
    prompt: "Create docs/cache-notes.md with two short markdown lines using the OpenClaw patch tool."
    tools:
      - type: function
        function:
          name: apply_patch
          description: "Apply structured multi-file patches"
          parameters:
            type: object
            properties:
              input:
                type: string
            required: [input]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const input = String(parsed.tool_calls[0]?.function?.arguments?.input || '');
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'apply_patch' &&
          (
            (/\*\*\* Begin Patch/.test(input) && /\*\*\* Add File: docs\/cache-notes\.md/.test(input)) ||
            (/^diff --git /m.test(input) && /(\+\+\+ b\/docs\/cache-notes\.md|new file mode)/.test(input))
          );

