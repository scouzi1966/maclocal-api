- description: "openclaw/web_search search recent cache bug reports"
  metadata:
    <<: *openclaw_meta
    source_urls:
      - "https://raw.githubusercontent.com/openclaw/openclaw/main/docs/tools/web.md"
      - "https://raw.githubusercontent.com/openclaw/openclaw/main/docs/tools/brave-search.md"
    framework: OpenClaw
    classification: not_yet_classified
  vars:
    prompt: "Search the web for recent Qwen prefix cache bugs from the last month."
    tools:
      - type: function
        function:
          name: web_search
          description: "Search the web"
          parameters:
            type: object
            properties:
              query:
                type: string
              freshness:
                type: string
              count:
                type: integer
            required: [query]
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const args = parsed.tool_calls[0]?.function?.arguments || {};
        return parsed.tool_calls.length === 1 &&
          parsed.tool_calls[0].function.name === 'web_search' &&
          /Qwen|prefix cache/i.test(String(args.query || '')) &&
          (args.freshness !== undefined || args.count !== undefined);

