- description: "schema/person_basic via API json_schema"
  vars:
    prompt: "Return a person record for Ada Lovelace, age 36, occupation mathematician."
    response_format:
      type: json_schema
      json_schema:
        name: person_record
        strict: true
        schema:
          type: object
          additionalProperties: false
          properties:
            name:
              type: string
            age:
              type: integer
            occupation:
              type: string
          required: [name, age, occupation]
  assert:
    - type: is-json
    - type: contains
      value: "\"name\""
    - type: contains
      value: "\"occupation\""

- description: "schema/meeting_action_items via API json_schema"
  vars:
    prompt: "Extract action items from this meeting note. Transcript: Sarah will draft the customer email by Friday. Ben owns the dashboard fix and will deploy on Tuesday. Priya needs to confirm pricing with finance this afternoon."
    response_format:
      type: json_schema
      json_schema:
        name: meeting_action_items
        strict: true
        schema:
          type: object
          additionalProperties: false
          properties:
            items:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  owner:
                    type: string
                  task:
                    type: string
                  due_date:
                    type: string
                required: [owner, task, due_date]
          required: [items]
  assert:
    - type: is-json
    - type: contains
      value: "\"items\""

- description: "schema/catalog_normalization refs via API json_schema"
  vars:
    prompt: "Normalize this product listing: TrailPro 18L commuter backpack. Water-resistant recycled nylon shell, laptop sleeve for 16 inch devices, color midnight blue, retail price 89 dollars, weight 0.9 kg, suitable for commuting and short hikes."
    response_format:
      type: json_schema
      json_schema:
        name: catalog_normalization
        strict: true
        schema:
          type: object
          additionalProperties: false
          properties:
            product_name:
              type: string
            category:
              type: string
              enum: [backpack, shoes, jacket, accessory]
            price_usd:
              type: number
            attributes:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  name:
                    type: string
                  value:
                    type: string
                required: [name, value]
            use_cases:
              type: array
              items:
                type: string
          required: [product_name, category, price_usd, attributes, use_cases]
  assert:
    - type: is-json
    - type: contains
      value: "\"attributes\""

- description: "edge/nullable field via API json_schema"
  vars:
    prompt: "Return a CRM lead record for customer Jordan Lee at Acme Labs. Jordan does not have a phone number on file and prefers email."
    response_format:
      type: json_schema
      json_schema:
        name: crm_lead_nullable
        strict: true
        schema:
          type: object
          additionalProperties: false
          properties:
            name:
              type: string
            company:
              type: string
            preferred_channel:
              type: string
              enum: [email, phone, sms]
            phone:
              type: [string, "null"]
          required: [name, company, preferred_channel, phone]
  assert:
    - type: is-json
    - type: contains
      value: "\"phone\""

- description: "edge/anyOf priority via API json_schema"
  vars:
    prompt: "Return a triage object for this issue: production payments are failing and executives are asking for updates every hour."
    response_format:
      type: json_schema
      json_schema:
        name: triage_anyof
        strict: true
        schema:
          type: object
          additionalProperties: false
          properties:
            priority:
              anyOf:
                - type: integer
                  enum: [1, 2, 3]
                - type: string
                  enum: [p1, p2, p3]
            summary:
              type: string
          required: [priority, summary]
  assert:
    - type: is-json
    - type: contains
      value: "\"priority\""

- description: "cli guided-json basic person"
  provider:
    id: ../providers/afm_provider.mjs
    label: afm-cli-guided-json
    config:
      transport: cli-guided-json
      binaryEnv: AFM_BINARY
      modelEnv: AFM_MODEL
      modelCacheEnv: MACAFM_MLX_MODEL_CACHE
  vars:
    prompt: "Return a person record for Grace Hopper, age 45, occupation computer scientist."
    guided_json:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        age:
          type: integer
        occupation:
          type: string
      required: [name, age, occupation]
  assert:
    - type: is-json
    - type: contains
      value: "\"name\""
