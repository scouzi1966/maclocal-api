<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maclocal-api Test Reports</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; background: #0d1117; color: #e6edf3; padding: 2rem; max-width: 900px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; padding: 2rem; background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%); border: 1px solid #30363d; border-radius: 12px; }
  .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; background: linear-gradient(90deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .meta { color: #8b949e; font-size: 0.9rem; }
  .header a { color: #58a6ff; text-decoration: none; }
  .header a:hover { text-decoration: underline; }

  .section { margin-bottom: 2rem; }
  .section h2 { font-size: 1.2rem; color: #58a6ff; border-bottom: 1px solid #21262d; padding-bottom: 0.5rem; margin-bottom: 1rem; }

  .report-list { list-style: none; }
  .report-list li { margin-bottom: 0.5rem; }
  .report-list a { display: block; padding: 0.75rem 1rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; text-decoration: none; font-size: 0.9rem; transition: border-color 0.15s; }
  .report-list a:hover { border-color: #58a6ff; }
  .date { color: #8b949e; font-size: 0.8rem; margin-left: 0.5rem; }
  .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 10px; font-size: 0.7rem; font-weight: 600; margin-right: 0.5rem; }
  .badge.html { background: #0c2d6b; color: #58a6ff; border: 1px solid #1f6feb; }
  .badge.csv { background: #0d2818; color: #3fb950; border: 1px solid #238636; }
  .badge.md { background: #3b1f72; color: #d2a8ff; border: 1px solid #8957e5; }
  .badge.jsonl { background: #2d2400; color: #d29922; border: 1px solid #9e6a03; }

  .loading { color: #8b949e; font-style: italic; padding: 1rem; }
  .error { color: #f85149; padding: 1rem; }

  .footer { text-align: center; margin-top: 2rem; color: #484f58; font-size: 0.8rem; }
  .footer a { color: #58a6ff; }
</style>
</head>
<body>

<div class="header">
  <h1>maclocal-api Test Reports</h1>
  <div class="meta">
    <a href="https://github.com/scouzi1966/maclocal-api">github.com/scouzi1966/maclocal-api</a>
  </div>
</div>

<div class="section" id="patch-reports">
  <h2>MLX Patch Comparison Reports</h2>
  <ul class="report-list" id="patch-list"><li class="loading">Loading...</li></ul>
</div>

<div class="section" id="model-reports">
  <h2>MLX Model Test Reports</h2>
  <ul class="report-list" id="model-list"><li class="loading">Loading...</li></ul>
</div>

<div class="section" id="analysis-reports">
  <h2>Smart Analysis Reports</h2>
  <ul class="report-list" id="analysis-list"><li class="loading">Loading...</li></ul>
</div>

<div class="footer">
  <a href="https://github.com/scouzi1966/maclocal-api">maclocal-api</a> &mdash; AFM local LLM server for Apple Silicon
</div>

<script>
const REPO = 'scouzi1966/maclocal-api';
const BRANCH = 'main';
const DIR = 'test-reports';

function createBadge(name) {
  const span = document.createElement('span');
  span.className = 'badge';
  if (name.endsWith('.html')) { span.classList.add('html'); span.textContent = 'HTML'; }
  else if (name.endsWith('.csv')) { span.classList.add('csv'); span.textContent = 'CSV'; }
  else if (name.endsWith('.md')) { span.classList.add('md'); span.textContent = 'MD'; }
  else if (name.endsWith('.jsonl')) { span.classList.add('jsonl'); span.textContent = 'JSONL'; }
  else { span.textContent = ''; }
  return span;
}

function extractDate(name) {
  const m = name.match(/(\d{8})(?:_(\d{6}))?/);
  if (!m) return '';
  const d = m[1];
  const t = m[2] || '';
  const formatted = d.slice(0,4) + '-' + d.slice(4,6) + '-' + d.slice(6,8);
  if (t) return formatted + ' ' + t.slice(0,2) + ':' + t.slice(2,4) + ':' + t.slice(4,6);
  return formatted;
}

function renderList(listEl, items) {
  listEl.replaceChildren();
  if (items.length === 0) {
    const li = document.createElement('li');
    li.style.cssText = 'color:#8b949e;padding:0.5rem;';
    li.textContent = 'No reports found.';
    listEl.appendChild(li);
    return;
  }
  items.sort(function(a, b) { return b.name.localeCompare(a.name); });
  items.forEach(function(f) {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = f.name;
    a.appendChild(createBadge(f.name));
    const nameText = document.createTextNode(' ' + f.name + ' ');
    a.appendChild(nameText);
    const date = extractDate(f.name);
    if (date) {
      const dateSpan = document.createElement('span');
      dateSpan.className = 'date';
      dateSpan.textContent = date;
      a.appendChild(dateSpan);
    }
    li.appendChild(a);
    listEl.appendChild(li);
  });
}

function showError(msg) {
  document.querySelectorAll('.report-list').forEach(function(el) {
    el.replaceChildren();
    const li = document.createElement('li');
    li.className = 'error';
    li.textContent = 'Failed to load: ' + msg + '. ';
    const a = document.createElement('a');
    a.href = 'https://github.com/' + REPO + '/tree/' + BRANCH + '/' + DIR;
    a.style.color = '#58a6ff';
    a.textContent = 'View on GitHub';
    li.appendChild(a);
    el.appendChild(li);
  });
}

async function loadReports() {
  try {
    const resp = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + DIR + '?ref=' + BRANCH);
    if (!resp.ok) throw new Error('GitHub API: ' + resp.status);
    const files = await resp.json();

    const patchFiles = files.filter(function(f) { return f.name.startsWith('mlx-patch-comparison-'); });
    const modelFiles = files.filter(function(f) { return f.name.startsWith('mlx-model-report-'); });
    const analysisFiles = files.filter(function(f) { return f.name.startsWith('smart-analysis-'); });

    renderList(document.getElementById('patch-list'), patchFiles);
    renderList(document.getElementById('model-list'), modelFiles);
    renderList(document.getElementById('analysis-list'), analysisFiles);
  } catch (e) {
    showError(e.message);
  }
}

loadReports();
</script>

</body>
</html>
