name: agentic-tool-loop-orchestration-harness
description: Deterministic multi-tool orchestration harness generated from agentic-tool-loop.
provenance:
  origin: harness_generated
  source_suite: agentic-tool-loop
  generator: agentblaster.harness
  generator_profile: orchestration
  generator_seed: 0
  generator_repeats: 3
  primary_source: AgentBlaster
  license: MIT
  risk_labels:
  - synthetic
  - internal-regression
  - harness-generated
  notes:
  - Built-in deterministic agentic loop workload for tool-result replay, MCP fixture
    calls, LCP context attachment, and max-tool-call stop-reason diagnostics.
  - Generated by AgentBlaster harness profile orchestration.
  - Review generated cases before using them as public benchmark claims.
cases:
- id: tool-loop-route-final-orchestration-01
  title: Fixture route tool loop reaches final answer / tool orchestration 1
  prompt: Use the route_agentblaster_task tool with route_id set to agentblaster-route-0-1-1.
    Ignore distractor tools unless they are necessary. After the tool call, provide
    a concise final answer.
  scenario: agentic tool loop
  messages: []
  provenance: synthetic_representative
  risk_level: low
  expected_json_fields: {}
  expected_tool_name: route_agentblaster_task
  tools:
  - type: function
    function:
      name: route_agentblaster_task
      description: Select the deterministic route for an AgentBlaster orchestration
        workload.
      parameters:
        type: object
        properties:
          route_id:
            type: string
            description: Required route marker.
          confidence:
            type: string
            enum:
            - low
            - medium
            - high
            description: Routing confidence.
        required:
        - route_id
        additionalProperties: false
  - type: function
    function:
      name: search_agentblaster_notes
      description: Distractor search tool for benchmark note lookup.
      parameters:
        type: object
        properties:
          query:
            type: string
        required:
        - query
        additionalProperties: false
  - type: function
    function:
      name: fetch_agentblaster_context
      description: Distractor context retrieval tool for local-agent planning.
      parameters:
        type: object
        properties:
          context_id:
            type: string
        required:
        - context_id
        additionalProperties: false
  - type: function
    function:
      name: finalize_agentblaster_plan
      description: Distractor finalization tool for multi-step agent planning.
      parameters:
        type: object
        properties:
          summary:
            type: string
        required:
        - summary
        additionalProperties: false
  tool_choice: auto
  max_tool_calls: 2
  simulated_tools: []
  expected_tool_result_substring: agentblaster-route-ok
  skills: []
  metrics:
  - tool_calls_valid
  - tool_loop_rounds
  - tool_loop_tool_call_count
  - tool_loop_stop_reason
  - latency_ms
  - ttft_ms
  - tool_call_count
  - invalid_tool_call_count
  timeout_seconds: 30.0
  streaming: false
  max_tokens: 96
  temperature: 0.0
  tags:
  - agentic
  - tool-loop
  - tool-result-replay
  - fixture
  - harness
  - orchestration
  - tool-routing
  - synthetic
