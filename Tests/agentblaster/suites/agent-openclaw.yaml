  messages: []
  provenance: synthetic_representative
  license: MIT
  risk_level: low
  expected_json_fields: {}
  expected_tool_name: search_docs
  system_prompt: Emit API-native tool calls only when a tool is required. Do not describe
    JSON or XML as plain text.
  tools:
  - type: function
    function:
      name: search_docs
      description: Search a deterministic in-memory documentation fixture.
      parameters:
        type: object
        properties:
          query:
            type: string
            description: Search query.
        required:
        - query
        additionalProperties: false
  tool_choice:
    type: function
    function:
      name: search_docs
  simulated_tools:
  - search_docs
  expected_tool_result_substring: local agentic inference engines
  skills: []
  metrics:
