name: agentic-opencode
description: Representative OpenCode-style coding agent workload generated by AgentBlaster.
provenance:
  origin: synthetic_representative
  generator: agentblaster.agent_profiles
  primary_source: AgentBlaster synthetic representative profiles
  license: MIT
  risk_labels:
  - synthetic
  - representative
  - agent-profile
  notes:
  - Generated profile suites are representative harness fixtures, not claims about
    exact upstream agent internals.
  - Use these suites to compare provider behavior under common local-agent prompt/tool
    shapes.
cases:
- id: opencode-read-plan
  title: OpenCode-style repository read before plan
  prompt: Inspect /repo/src/app.py with read_file_fixture before answering. Report
    the exact status string.
  scenario: code edit loop
  messages: []
  provenance: synthetic_representative
  license: MIT
  risk_level: low
  expected_json_fields: {}
  expected_tool_name: read_file_fixture
  system_prompt: You are a local coding agent. Use fixture tools only and keep the
    final answer concise.
  tools:
  - type: function
    function:
      name: read_file_fixture
      description: Read a deterministic fake repository file without touching the
        host filesystem.
      parameters:
        type: object
        properties:
          path:
            type: string
            description: Fixture path to read.
        required:
        - path
        additionalProperties: false
  tool_choice:
    type: function
    function:
      name: read_file_fixture
  simulated_tools:
  - read_file_fixture
  expected_tool_result_substring: agentblaster-ok
  skills:
  - repo-triage
  - safe-tool-replay
  metrics:
  - ttft_ms
  - tool_calls_valid
  - tokens_per_second_decode
  timeout_seconds: 30.0
  streaming: false
  max_tokens: 96
  temperature: 0.0
  tags:
  - agent-profile
  - opencode
  - code
  - toolcall
- id: opencode-test-loop-trace
  title: OpenCode-style test loop trace replay
  prompt: Use the replayed test output and answer whether the fixture tests passed.
  scenario: code edit loop
  messages:
  - role: system
    content: You are replaying a safe coding-agent test loop. Answer from tool results
      only.
    tool_calls: []
  - role: user
    content: Run pytest -q.
    tool_calls: []
  - role: assistant
    content: ''
    tool_calls:
    - id: call_pytest
      type: function
      function:
        name: shell_fixture
        arguments: '{"command":"pytest -q"}'
  - role: tool
    content: '{"command":"pytest -q","exit_code":0,"stdout":"3 passed

      ","stderr":""}'
    name: shell_fixture
    tool_call_id: call_pytest
    tool_calls: []
  - role: user
    content: 'Did the tests pass? Reply with exactly: agentblaster-ok'
    tool_calls: []
  provenance: synthetic_representative
  license: MIT
  risk_level: low
  expected_substring: agentblaster-ok
  expected_json_fields: {}
  tools: []
  simulated_tools: []
  skills:
  - repo-triage
  - agent-planning
  metrics:
  - latency_ms
  - tokens_per_second_decode
  timeout_seconds: 30.0
  streaming: false
  max_tokens: 32
  temperature: 0.0
  tags:
  - agent-profile
  - opencode
  - trace-replay
  - tests

